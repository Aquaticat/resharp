[[test]]
name = "reverse_center_lookbehind_from_lookahead_alt_star"
pattern = '(?:(?=b)|-)b*b(?!b)'
expect_error = true
reason = "reverse contains lookbehind in center of concat"

[[test]]
name = "lookbehind_lookahead_alt_neg_lookahead_no_fwd_end"
