description = '''
expected internal representation
'''

[[test]]
name = 'not-begins?'
pattern = '(?!\A)'
pp = '(?=~(\A_*)\z)'

[[test]]
name = 'not-begins?'
pattern = '(?!\A)(?=[A-Z])'
pp = '(?=[A-Z]_*){∅}❮(&~(\A_*))❯'

[[test]]
name = 'lookahead_lift_anchor'
pattern = '(?=^keychain:\s)'
pp = '(?<=_*(\A|\n))(?=keychain:[\t-\r ]_*)'

[[test]]
name = 'foo_anch'
pattern = '^_*foo_*$'
pp = "_*foo_*"

[[test]]
pattern = 'aa(?!a) *'
pp = 'aa(?=~(a_*)\z){∅}❮ *❯'

[[test]]
pattern = '\s'
pp = '[\t-\r ]'

[[test]]
name = 'anchor_line_star'
pattern = '^abc.*$'
pp = '(?<=_*(\A|\n))abc.*(?=(\z|\n)_*)'
ts_rev = '_*cba(?=(\z|\n)_*)'

[[test]]
name = 'anchor_line_literal'
pattern = '^abc$'
pp = '(?<=_*(\A|\n))abc(?=(\z|\n)_*)'
ts_rev = '_*(\A|\n)cba(?=(\z|\n)_*)'

[[test]]
name = 'anchor_line_digit_star'
pattern = '^\d+$'
pp = '(?<=_*(\A|\n))[0-9]+(?=(\z|\n)_*)'
ts_rev = '_*(\A|\n)[0-9]*[0-9](?=(\z|\n)_*)'

[[test]]
name = 'anchor_line_star_leading'
pattern = '^.*abc$'
pp = '(?<=_*(\A|\n)).*abc(?=(\z|\n)_*)'
ts_rev = '_*(\A|\n)cba.*(?=(\z|\n)_*)'

[[test]]
name = 'neg_la'
pattern = '(?!a).'
pp = '[^\na]'




[[test]]
name = 'neg_la_single_byte'
pattern = 'b(?!a)'
pp = 'b(?=~(a_*)\z)'
ts_rev = '(\Ab|_*[^a]b)'

[[test]]
name = 'neg_la_ascii_word_class'
pattern = 'x(?![a-zA-Z0-9_])'
pp = 'x(?=~([0-9A-Z\_a-z]_*)\z)'
ts_rev = '(\Ax|_*[^0-9A-Z\_a-z]x)'

[[test]]
name = 'end_anchor_then_literal'
pattern = '\za'
pp = '⊥'

[[test]]
name = 'end_anchor_then_literal_after_prefix'
pattern = 'a\zb'
pp = '⊥'

[[test]]
name = 'end_anchor_then_class'
pattern = '\z[abc]'
pp = '⊥'

[[test]]
name = 'la_peel_drop'
pattern = '(?=a).'
pp = 'a'

[[test]]
name = 'la_peel_unsat_single'
pattern = '(?=a)b'
