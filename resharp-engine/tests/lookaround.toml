[[test]]
name = "lookahead_multiple_bbb_ccc"
pattern = ".*(?=.*bbb)(?=.*ccc)"
input = "aaa bbb ccc"
matches = [[0, 4], [4, 4]]

[[test]]
name = "lookahead_multiple_13_2"
pattern = "1(?=.*3)(?=.*2)"
