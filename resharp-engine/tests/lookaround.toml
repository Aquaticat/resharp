description = '''
lookahead, lookbehind, combined lookaround, and negative lookaround tests.
matches = [[start, end]] in utf8 bytes
'''

[[test]]
name = "neg_lookbehind_b"
pattern = "(?<!a)"
input = "b"
matches = [[0, 0], [1, 1]]

[[test]]
name = "lookahead_conditional_digit"
pattern = '1(?=[012])\d'
input = "11"
matches = [[0, 2]]

[[test]]
name = "lookbehind_a_wb_b"
pattern = '(?<=a.*)\bb'
input = "a  b"
matches = [[3, 4]]

[[test]]
name = "lookahead_greedy"
pattern = ".*(?=aaa)"
input = "baaa"
matches = [[0, 1], [1, 1]]

[[test]]
name = "lookahead_zero_width"
pattern = "(?=a)"
input = "a"
matches = [[0, 0]]

[[test]]
name = "lookahead_a_then_a"
pattern = "a(?=a)"
input = "aa"
matches = [[0, 1]]

[[test]]
name = "lookahead_a_then_b"
pattern = "a(?=b)"
input = "_ab_ab_"
matches = [[1, 2], [4, 5]]

[[test]]
name = "lookahead_bb_aa"
pattern = "bb(?=aa)"
input = "__bbaa__"
matches = [[2, 4]]

[[test]]
name = "lookahead_bb_a"
pattern = "bb(?=a)"
input = "__bbaaa__"
matches = [[2, 4]]

[[test]]
name = "lookahead_bb_aaa"
pattern = "bb(?=aaa)"
input = "__bbaaa__"
matches = [[2, 4]]

[[test]]
name = "lookahead_bb_aaaa"
pattern = "bb(?=aaaa)"
input = "__bbaaaa__"
matches = [[2, 4]]

[[test]]
name = "lookahead_bb_aaaaa"
pattern = "bb(?=aaaaa)"
input = "__bbaaaaa__"
matches = [[2, 4]]

[[test]]
name = "lookahead_word_springer"
pattern = '\w+(?=.*Springer)'
input = "publisher={Springer}"
matches = [[0, 9]]

[[test]]
name = "lookahead_word_springer_wildcard"
pattern = '\w+(?=_*Springer)'
input = "publisher={Springer}"
matches = [[0, 9]]

[[test]]
name = "lookahead_dot_c"
pattern = ".(?=.*c)"
